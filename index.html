<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>Twitch 派系投票</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Microsoft JhengHei', sans-serif;
    background: #0e0e10;
    color: #efeff1;
    min-height: 100vh;
    transition: background 0.2s;
  }
  body[data-bg="green"] { background: #00ff00; }
  body[data-bg="white"] { background: #ffffff; }
  body[data-bg="green"] #status,
  body[data-bg="white"] #status,
  body[data-bg="green"] .controls,
  body[data-bg="white"] .controls,
  body[data-bg="green"] #feed,
  body[data-bg="white"] #feed { display: none; }
  body[data-bg="green"] #results,
  body[data-bg="white"] #results { background: transparent; }
  body[data-bg="green"] #board,
  body[data-bg="white"] #board { height: 100vh; }
  .bg-picker {
    position: fixed; top: 8px; right: 8px; z-index: 999;
    display: flex; gap: 4px; background: rgba(0,0,0,0.5);
    padding: 4px; border-radius: 6px;
  }
  .bg-picker button {
    width: 28px; height: 28px; padding: 0; border-radius: 4px;
    border: 2px solid transparent; cursor: pointer; font-size: 0;
  }
  .bg-picker button.active { border-color: #fff; }
  .bg-picker .bg-dark { background: #0e0e10; }
  .bg-picker .bg-green { background: #00ff00; }
  .bg-picker .bg-white { background: #ffffff; }
  h1 { margin-top: 0; }
  #setup { padding: 24px; max-width: 820px; margin: 0 auto; }
  .field { margin: 12px 0; }
  .field label { display: block; margin-bottom: 4px; font-size: 13px; opacity: 0.7; }
  .field input {
    width: 100%; padding: 10px 12px;
    background: #1f1f23; border: 1px solid #3a3a3d; color: #efeff1;
    border-radius: 4px; font-size: 14px;
  }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .hint { font-size: 12px; opacity: 0.55; margin-top: -4px; margin-bottom: 8px; }
  button {
    background: #9147ff; color: white; border: 0; padding: 11px 20px;
    border-radius: 4px; cursor: pointer; font-size: 15px; font-weight: bold;
  }
  button:hover { filter: brightness(1.1); }
  button.danger { background: #c93028; }
  button.ghost { background: #2a2a2e; }

  #vote { display: none; }
  #status {
    padding: 14px 20px; background: #1f1f23; font-size: 16px;
    border-bottom: 2px solid #2a2a2e; font-weight: bold;
  }
  #status.connected { color: #00f593; }
  #status.error { color: #ff6b6b; }

  #board {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 16px; padding: 20px;
    height: calc(100vh - 420px);
    min-height: 360px;
  }
  .faction {
    background: #1f1f23; border-radius: 8px; padding: 18px;
    display: flex; flex-direction: column; position: relative;
    border-top: 6px solid var(--col);
    transition: transform 0.2s;
  }
  .faction.leader { box-shadow: 0 0 30px var(--col); transform: translateY(-3px); }
  .faction h2 {
    margin: 0; font-size: 30px;
    color: var(--col);
  }
  .faction .keyword {
    font-size: 13px; opacity: 0.65; margin: 4px 0 8px;
    font-family: Consolas, monospace;
  }
  .faction .count {
    font-size: 72px; font-weight: 900; line-height: 1;
    margin: 6px 0;
  }
  .faction .pct { font-size: 14px; opacity: 0.7; margin-bottom: 14px; }
  .faction .voters {
    flex: 1 1 0; min-height: 0; overflow-y: auto; font-size: 13px;
    background: #0e0e10; border-radius: 4px; padding: 8px;
  }
  .faction.collapsed .voters { display: none; }
  .faction.collapsed { flex: 0; }
  .faction .collapse-btn {
    position: absolute; top: 12px; right: 12px;
    background: rgba(255,255,255,0.08); border: 1px solid #3a3a3d;
    color: #efeff1; width: 32px; height: 32px; border-radius: 4px;
    cursor: pointer; padding: 0; font-size: 16px; line-height: 1;
  }
  .faction .collapse-btn:hover { background: rgba(255,255,255,0.18); }
  .voter {
    padding: 3px 6px; border-bottom: 1px solid #1a1a1d;
    animation: drop 0.45s ease-out;
  }
  @keyframes drop {
    from { transform: translateX(-12px); opacity: 0; background: var(--col); }
    to { transform: translateX(0); opacity: 1; background: transparent; }
  }
  .leader-tag {
    position: absolute; top: -14px; right: 14px;
    background: var(--col); color: #000;
    padding: 3px 10px; border-radius: 99px;
    font-size: 11px; font-weight: bold; letter-spacing: 1px;
  }
  .controls { padding: 12px 20px; background: #1f1f23; border-top: 1px solid #2a2a2e; }
  .controls button { margin-right: 8px; }
  #meta { margin-left: 16px; opacity: 0.7; font-size: 13px; }

  #feed {
    padding: 12px 20px; background: #0a0a0c; font-size: 13px;
    font-family: Consolas, monospace; height: 240px; overflow-y: auto;
    border-top: 2px solid #9147ff;
  }
  #feed::before {
    content: '聊天室即時 Feed（debug 用）';
    display: block; font-size: 11px; opacity: 0.6;
    margin-bottom: 6px; letter-spacing: 1px;
  }
  #feed .line { opacity: 0.7; padding: 2px 0; }
  #feed .line.hit { opacity: 1; color: #00f593; font-weight: bold; }

  #results { display: none; min-height: 100vh; padding: 40px 20px;
    background: radial-gradient(ellipse at center top, #2a1f3a 0%, #0e0e10 70%); }
  #results h1 { text-align: center; font-size: 56px; margin: 10px 0 6px;
    background: linear-gradient(180deg, #ffe066 0%, #ff9844 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 6px; }
  #results .subtitle { text-align: center; opacity: 0.65; font-size: 14px;
    margin-bottom: 30px; letter-spacing: 2px; }
  .podium { display: grid; grid-template-columns: 1fr 1.3fr 1fr; gap: 20px;
    max-width: 1200px; margin: 0 auto; align-items: end; }
  .pod {
    border-radius: 12px; padding: 24px 18px; text-align: center;
    background: #1f1f23; border-top: 8px solid var(--col); position: relative;
    animation: rise 0.6s ease-out;
  }
  .pod-1 { transform: translateY(-30px); padding: 36px 18px;
    box-shadow: 0 0 60px var(--col); }
  .pod .rank-badge {
    font-size: 64px; font-weight: 900; line-height: 1;
    color: var(--col); margin-bottom: 8px; text-shadow: 0 2px 0 #000;
  }
  .pod-1 .rank-badge { font-size: 96px; }
  .pod .pod-name { font-size: 28px; font-weight: bold; margin: 6px 0; color: var(--col); }
  .pod-1 .pod-name { font-size: 38px; }
  .pod .pod-count { font-size: 56px; font-weight: 900; margin: 8px 0 4px; }
  .pod-1 .pod-count { font-size: 80px; }
  .pod .pod-pct { opacity: 0.7; font-size: 14px; margin-bottom: 14px; }
  .pod .pod-voters {
    background: #0e0e10; border-radius: 6px; padding: 8px;
    max-height: 200px; overflow-y: auto; font-size: 12px; text-align: left;
  }
  .pod .pod-voters .voter { padding: 2px 4px; opacity: 0.85; }
  .pod .winner-tag {
    position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
    background: var(--col); color: #000; padding: 4px 16px; border-radius: 99px;
    font-size: 12px; font-weight: bold; letter-spacing: 2px;
  }
  @keyframes rise {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .pod-1 { animation-delay: 0.3s; animation-fill-mode: backwards; }
  .pod-2 { animation-delay: 0.1s; animation-fill-mode: backwards; }
  .pod-3 { animation-delay: 0.2s; animation-fill-mode: backwards; }
  #results .summary { text-align: center; margin: 30px 0 20px; opacity: 0.8; font-size: 15px; }
  #results .actions { text-align: center; margin-top: 20px; }
  #results .actions button { margin: 0 8px; }
</style>
</head>
<body>

<div class="bg-picker" id="bgPicker">
  <button class="bg-dark active" data-mode="" title="原色（深色）">●</button>
  <button class="bg-green" data-mode="green" title="純綠（OBS 去背用）">●</button>
  <button class="bg-white" data-mode="white" title="純白">●</button>
</div>

<div id="setup">
  <h1>Twitch 派系投票測試</h1>
  <div class="field">
    <label>實況主頻道（小寫，不含 #）</label>
    <input id="channel" placeholder="例如 kissmonster">
    <div class="hint">不需要登入，匿名讀取公開聊天室</div>
  </div>

  <div class="row">
    <div class="field"><label>A 派系名稱</label><input id="fA" value="親親幫"></div>
    <div class="field"><label>A 派系關鍵詞</label><input id="kA" value="A"></div>
  </div>
  <div class="row">
    <div class="field"><label>B 派系名稱</label><input id="fB" value="波貝貝"></div>
    <div class="field"><label>B 派系關鍵詞</label><input id="kB" value="B"></div>
  </div>
  <div class="row">
    <div class="field"><label>C 派系名稱</label><input id="fC" value="消證明"></div>
    <div class="field"><label>C 派系關鍵詞</label><input id="kC" value="C"></div>
  </div>

  <div class="hint" style="margin-top:8px;">
    規則：每個觀眾只能投一次，第一條符合任何關鍵詞的訊息決定派系。<br>
    比對規則：<br>
    &nbsp;・單一英數字元（如 <code>A</code>）→ 獨立詞比對，不會被 <code>ABC</code> 觸發<br>
    &nbsp;・其他（如 <code>eso</code>、<code>親親幫</code>）→ 包含比對，<code>esoBump</code> 會觸發 <code>eso</code><br>
    &nbsp;・含 <code>*</code> 萬用字元（如 <code>eso*</code>）→ regex 比對任意英數延伸
  </div>

  <div style="margin-top: 20px;">
    <button onclick="start()">開始投票</button>
  </div>
</div>

<div id="vote">
  <div id="status">未連線</div>
  <div id="board"></div>
  <div class="controls">
    <button onclick="reset()">清空票數</button>
    <button class="ghost" onclick="exportCSV()">匯出 CSV</button>
    <button class="danger" onclick="stop()">結束投票</button>
    <span id="meta"></span>
  </div>
  <div id="feed"></div>
</div>

<div id="results">
  <h1>投票結果</h1>
  <div class="subtitle" id="resultsSubtitle"></div>
  <div class="podium" id="podium"></div>
  <div class="summary" id="resultsSummary"></div>
  <div class="actions">
    <button class="ghost" onclick="exportCSV()">匯出 CSV</button>
    <button onclick="backToSetup()">回到設定</button>
  </div>
</div>

<script>
const COLORS = ['#ff4d6d', '#3da9fc', '#90e34d'];
const factions = [];
const userVotes = new Map();
let ws = null;
let startTs = 0;
let totalChat = 0;
let metaTimer = null;
let currentChannel = '';

function $(id) { return document.getElementById(id); }

document.getElementById('bgPicker').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  const mode = btn.dataset.mode;
  if (mode) document.body.setAttribute('data-bg', mode);
  else document.body.removeAttribute('data-bg');
  document.querySelectorAll('#bgPicker button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  try { localStorage.setItem('bg-mode', mode || ''); } catch(e) {}
});

(function restoreBg() {
  try {
    const saved = localStorage.getItem('bg-mode');
    if (saved) {
      document.body.setAttribute('data-bg', saved);
      document.querySelectorAll('#bgPicker button').forEach(b => {
        b.classList.toggle('active', b.dataset.mode === saved);
      });
    }
  } catch(e) {}
})();

function start() {
  const channel = $('channel').value.trim().toLowerCase();
  if (!channel) { alert('請輸入頻道名稱'); return; }

  factions.length = 0;
  ['A', 'B', 'C'].forEach((k, i) => {
    factions.push({
      name: $('f' + k).value.trim() || k,
      keyword: $('k' + k).value.trim(),
      color: COLORS[i],
      count: 0,
      voters: []
    });
  });

  if (factions.some(f => !f.keyword)) {
    alert('每個派系都要有關鍵詞'); return;
  }
  const keywords = factions.map(f => f.keyword.toLowerCase());
  if (new Set(keywords).size !== 3) {
    alert('關鍵詞不可重複'); return;
  }

  $('setup').style.display = 'none';
  $('vote').style.display = 'block';

  renderBoard();

  currentChannel = channel;
  logFeed(`[1] start() 執行，目標頻道：${channel}`, true);
  $('status').textContent = `連線中 #${channel} ...`;
  $('status').className = '';

  try {
    ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');
  } catch (e) {
    logFeed(`[FATAL] WebSocket 建立失敗：${e.message}`, false);
    $('status').textContent = 'WebSocket 失敗'; $('status').className = 'error';
    return;
  }
  logFeed('[2] WebSocket 物件已建立', true);

  ws.onopen = () => {
    logFeed('[3] WebSocket onopen 觸發', true);
    const nick = 'justinfan' + Math.floor(Math.random() * 99999);
    ws.send('CAP REQ :twitch.tv/tags twitch.tv/commands');
    ws.send('PASS SCHMOOPIIE');
    ws.send('NICK ' + nick);
    ws.send('JOIN #' + channel);
    logFeed(`[4] 已送 JOIN #${channel}（暱稱 ${nick}）`, true);
    $('status').textContent = `WebSocket 已連（等待 JOIN #${channel}...）`;
    $('status').className = 'connected';
  };

  ws.onerror = (e) => {
    logFeed(`[FATAL] WebSocket onerror`, false);
    $('status').textContent = 'WebSocket 錯誤';
    $('status').className = 'error';
  };

  ws.onclose = (e) => {
    logFeed(`[ws closed] code=${e.code} reason=${e.reason || '(無)'}`, false);
    $('status').textContent = `已斷線（code ${e.code}）`;
    $('status').className = 'error';
  };

  ws.onmessage = (event) => {
    const lines = event.data.split('\r\n').filter(l => l.length > 0);
    for (const line of lines) handleIrcLine(line);
  };

  startTs = Date.now();
  metaTimer = setInterval(updateMeta, 1000);
}

function handleIrcLine(line) {
  if (line.startsWith('PING')) {
    ws.send('PONG :tmi.twitch.tv');
    return;
  }

  const parsed = parseIrc(line);
  if (!parsed) return;

  if (parsed.command === 'JOIN' && parsed.nick && parsed.nick.startsWith('justinfan')) {
    $('status').textContent = `已加入 #${currentChannel}（聽 chat 中）`;
    logFeed(`[joined #${parsed.params[0]?.replace(/^#/, '')}]`, true);
    return;
  }

  if (parsed.command === 'NOTICE') {
    logFeed(`[notice] ${parsed.trailing}`, false);
    return;
  }

  if (parsed.command === '001') {
    logFeed('[5] Twitch IRC 認證成功（welcome）', true);
    return;
  }

  if (parsed.command !== 'PRIVMSG') return;

  totalChat++;
  const userId = parsed.tags['user-id'];
  const display = parsed.tags['display-name'] || parsed.nick || 'anon';
  const message = parsed.trailing || '';

  if (!userId) {
    logFeed(`${display}: ${message}`, false);
    return;
  }

  const lower = message.toLowerCase();
  for (let i = 0; i < factions.length; i++) {
    if (matchKeyword(lower, factions[i].keyword.toLowerCase())) {
      const prev = userVotes.get(userId);
      if (prev === i) {
        logFeed(`${display}: ${message}  (已在 ${factions[i].name})`, false);
        return;
      }
      if (prev !== undefined) {
        factions[prev].count--;
        factions[prev].voters = factions[prev].voters.filter(v => v.id !== userId);
      }
      userVotes.set(userId, i);
      factions[i].count++;
      factions[i].voters.unshift({ id: userId, name: display });
      if (factions[i].voters.length > 200) factions[i].voters.pop();
      renderBoard();
      logFeed(`${display} ${prev !== undefined ? '換到' : '→'} ${factions[i].name}`, true);
      return;
    }
  }
  logFeed(`${display}: ${message}`, false);
}

function parseIrc(line) {
  const out = { tags: {}, prefix: '', nick: '', command: '', params: [], trailing: '' };
  let rest = line;

  if (rest.startsWith('@')) {
    const sp = rest.indexOf(' ');
    const tagStr = rest.slice(1, sp);
    rest = rest.slice(sp + 1);
    tagStr.split(';').forEach(kv => {
      const eq = kv.indexOf('=');
      if (eq < 0) out.tags[kv] = true;
      else out.tags[kv.slice(0, eq)] = kv.slice(eq + 1);
    });
  }
  if (rest.startsWith(':')) {
    const sp = rest.indexOf(' ');
    out.prefix = rest.slice(1, sp);
    const bang = out.prefix.indexOf('!');
    out.nick = bang > 0 ? out.prefix.slice(0, bang) : '';
    rest = rest.slice(sp + 1);
  }
  const trailingIdx = rest.indexOf(' :');
  if (trailingIdx >= 0) {
    out.trailing = rest.slice(trailingIdx + 2);
    rest = rest.slice(0, trailingIdx);
  }
  const parts = rest.split(' ');
  out.command = parts[0];
  out.params = parts.slice(1);
  return out;
}

function matchKeyword(message, keyword) {
  // 萬用字元：含 * 走 wildcard regex（eso* / *bump / *eso*）
  if (keyword.includes('*')) {
    const escaped = keyword.replace(/[.+?^${}()|[\]\\]/g, '\\$&').replace(/\*/g, '[a-z0-9_]*');
    return new RegExp(escaped, 'i').test(message);
  }
  // 單字英數（A、B、1）走 word boundary，避免 A 撞到 ABC
  if (keyword.length === 1 && /^[a-z0-9_]$/i.test(keyword)) {
    const escaped = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return new RegExp('(^|[^a-z0-9_])' + escaped + '($|[^a-z0-9_])', 'i').test(message);
  }
  // 其他（含 eso, 親親幫）一律用包含比對
  return message.includes(keyword);
}

function renderBoard() {
  const board = $('board');
  const total = factions.reduce((s, f) => s + f.count, 0);
  const max = Math.max(...factions.map(f => f.count));

  board.innerHTML = factions.map((f, idx) => {
    const pct = total > 0 ? (f.count / total * 100).toFixed(1) : '0.0';
    const isLeader = max > 0 && f.count === max;
    const collapsed = f.collapsed;
    return `
      <div class="faction ${isLeader ? 'leader' : ''} ${collapsed ? 'collapsed' : ''}" style="--col: ${f.color}">
        ${isLeader ? '<div class="leader-tag">LEADING</div>' : ''}
        <button class="collapse-btn" onclick="toggleCollapse(${idx})" title="${collapsed ? '展開' : '收合'}名單">${collapsed ? '＋' : '－'}</button>
        <h2>${esc(f.name)}</h2>
        <div class="keyword">關鍵詞：${esc(f.keyword)}</div>
        <div class="count">${f.count}</div>
        <div class="pct">${pct}%</div>
        <div class="voters">
          ${f.voters.slice(0, 80).map(v => `<div class="voter">${esc(v.name)}</div>`).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function toggleCollapse(i) {
  factions[i].collapsed = !factions[i].collapsed;
  renderBoard();
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => (
    { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
  ));
}

function updateMeta() {
  const total = factions.reduce((s, f) => s + f.count, 0);
  const elapsed = startTs ? Math.floor((Date.now() - startTs) / 1000) : 0;
  const mm = Math.floor(elapsed / 60).toString().padStart(2, '0');
  const ss = (elapsed % 60).toString().padStart(2, '0');
  const rate = totalChat > 0 ? (total / totalChat * 100).toFixed(1) : '0.0';
  $('meta').textContent = `總票數 ${total} / 聊天 ${totalChat} (${rate}%)　|　時間 ${mm}:${ss}`;
}

function logFeed(text, hit) {
  const feed = $('feed');
  const line = document.createElement('div');
  line.className = 'line' + (hit ? ' hit' : '');
  line.textContent = text;
  feed.appendChild(line);
  while (feed.childNodes.length > 30) feed.removeChild(feed.firstChild);
  feed.scrollTop = feed.scrollHeight;
}

function reset() {
  if (!confirm('清空所有票數，重新開始？')) return;
  userVotes.clear();
  factions.forEach(f => { f.count = 0; f.voters = []; });
  totalChat = 0;
  startTs = Date.now();
  $('feed').innerHTML = '';
  renderBoard();
  logFeed('[reset]', true);
}

function exportCSV() {
  const rows = [['faction', 'voter']];
  factions.forEach(f => {
    f.voters.forEach(v => rows.push([f.name, v.name]));
  });
  const csv = '﻿' + rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `vote_${Date.now()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function stop() {
  if (ws) { try { ws.close(); } catch(e) {} ws = null; }
  if (metaTimer) { clearInterval(metaTimer); metaTimer = null; }
  showResults();
}

function showResults() {
  $('vote').style.display = 'none';
  $('setup').style.display = 'none';
  $('results').style.display = 'block';

  const ranked = factions
    .map((f, i) => ({ ...f, origIdx: i }))
    .sort((a, b) => b.count - a.count);

  const total = ranked.reduce((s, f) => s + f.count, 0);
  const elapsed = startTs ? Math.floor((Date.now() - startTs) / 1000) : 0;
  const mm = Math.floor(elapsed / 60).toString().padStart(2, '0');
  const ss = (elapsed % 60).toString().padStart(2, '0');

  $('resultsSubtitle').textContent = `#${currentChannel}　|　投票時間 ${mm}:${ss}`;

  const RANK_LABELS = ['1st', '2nd', '3rd'];
  const RANK_TAGS = ['CHAMPION', 'RUNNER-UP', '3RD'];
  const RANK_ORDER = [1, 0, 2]; // 顯示順序：第二、第一、第三（讓第一在中間）

  $('podium').innerHTML = RANK_ORDER.map((rankIdx) => {
    const f = ranked[rankIdx];
    if (!f) return '';
    const pct = total > 0 ? (f.count / total * 100).toFixed(1) : '0.0';
    return `
      <div class="pod pod-${rankIdx + 1}" style="--col: ${f.color}">
        ${rankIdx === 0 ? `<div class="winner-tag">${RANK_TAGS[rankIdx]}</div>` : ''}
        <div class="rank-badge">${RANK_LABELS[rankIdx]}</div>
        <div class="pod-name">${esc(f.name)}</div>
        <div class="pod-count">${f.count}</div>
        <div class="pod-pct">${pct}%　關鍵詞 ${esc(f.keyword)}</div>
        <div class="pod-voters">
          ${f.voters.length === 0 ? '<div class="voter" style="opacity:0.4;">（無投票者）</div>'
            : f.voters.slice(0, 50).map(v => `<div class="voter">${esc(v.name)}</div>`).join('')}
          ${f.voters.length > 50 ? `<div class="voter" style="opacity:0.5;">...還有 ${f.voters.length - 50} 人</div>` : ''}
        </div>
      </div>
    `;
  }).join('');

  $('resultsSummary').textContent = `總票數 ${total}　|　聊天訊息 ${totalChat}　|　參與率 ${totalChat > 0 ? (total/totalChat*100).toFixed(1) : 0}%`;
}

function backToSetup() {
  $('results').style.display = 'none';
  $('setup').style.display = 'block';
  factions.length = 0;
  userVotes.clear();
  totalChat = 0;
  startTs = 0;
}
</script>
</body>
</html>
